server:
  port: ${APP_PORT:18080}
  tomcat:
    connection-timeout: 15s
    keep-alive-timeout: 60s

http:
  web-client:
    connect-timeout-ms: ${HTTP_WEB_CLIENT_CONNECT_TIMEOUT_MS:5000}
    response-timeout-seconds: ${HTTP_WEB_CLIENT_RESPONSE_TIMEOUT_SECONDS:180}

spring:
  application:
    name: realtyos-api
  profiles:
    active: loc
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:}
            client-secret: ${KAKAO_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            scope:
              - openid
              - profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:false}
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 1000
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true
      jdbc:
        time_zone: Asia/Seoul
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: 0

# Actuator — health 엔드포인트만 노출
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

auth:
  frontend-redirect-url: ${AUTH_FRONTEND_REDIRECT_URL:http://localhost:5173/oauth2/callback}


# 번역 프로바이더 선택: GOOGLE (Google Cloud Translation) 또는 GEMINI (Gemini API, 저비용)
translation:
  provider: ${TRANSLATION_PROVIDER:GEMINI}

ai:
  embedding:
    default-provider: ${AI_EMBEDDING_DEFAULT_PROVIDER:OPENAI}
  openai:
    key: ${OPENAI_API_KEY:}
    embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    embedding-enabled: ${OPENAI_EMBEDDING_ENABLED:true}
    embedding-batch-size: ${OPENAI_EMBEDDING_BATCH_SIZE:50}
    embedding-max-input-chars: ${OPENAI_EMBEDDING_MAX_INPUT_CHARS:1200}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    chat-model: ${OLLAMA_CHAT_MODEL:qwen3:8b}
    embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    embedding-batch-size: ${OLLAMA_EMBEDDING_BATCH_SIZE:10}
    think-enabled: ${OLLAMA_THINK_ENABLED:false}
    chat-num-ctx: ${OLLAMA_CHAT_NUM_CTX:4096}
    chat-num-predict: ${OLLAMA_CHAT_NUM_PREDICT:1200}
  router:
    enabled: ${AI_ROUTER_ENABLED:true}
    local-first: ${AI_ROUTER_LOCAL_FIRST:true}
    local-max-input-chars: ${AI_ROUTER_LOCAL_MAX_INPUT_CHARS:6000}
    default-provider: ${AI_ROUTER_DEFAULT_PROVIDER:OPENAI}
    default-model: ${AI_ROUTER_DEFAULT_MODEL:gpt-4o-mini}
    local-provider: ${AI_ROUTER_LOCAL_PROVIDER:OLLAMA}
    local-model: ${AI_ROUTER_LOCAL_MODEL:qwen3:8b}
    high-quality-provider: ${AI_ROUTER_HIGH_QUALITY_PROVIDER:OPENAI}
    high-quality-model: ${AI_ROUTER_HIGH_QUALITY_MODEL:gpt-4o-mini}
    fallback-provider: ${AI_ROUTER_FALLBACK_PROVIDER:OPENAI}
    fallback-model: ${AI_ROUTER_FALLBACK_MODEL:gpt-4o-mini}

rag:
  sync:
    enabled: ${RAG_SYNC_ENABLED:true}
    cron: ${RAG_SYNC_CRON:0 30 4 * * ?}
    zone: ${RAG_SYNC_ZONE:Asia/Seoul}
    document-limit: ${RAG_SYNC_DOCUMENT_LIMIT:0}
    embedding-limit: ${RAG_SYNC_EMBEDDING_LIMIT:5000}
    embedding-provider: ${RAG_SYNC_EMBEDDING_PROVIDER:OPENAI}
    embedding-model: ${RAG_SYNC_EMBEDDING_MODEL:text-embedding-3-small}


# Firebase (Push Notification)
firebase:
  service-account-key: ${FIREBASE_SERVICE_ACCOUNT_KEY:firebase-service-account.json}

# In-App Purchase (IAP) Settings
iap:
  apple:
    issuer-id: ${IAP_APPLE_ISSUER_ID:}
    key-id: ${IAP_APPLE_KEY_ID:}
    bundle-id: ${IAP_APPLE_BUNDLE_ID:}
    private-key: ${IAP_APPLE_PRIVATE_KEY:}
    sandbox: ${IAP_APPLE_SANDBOX:true}
  google:
    package-name: ${IAP_GOOGLE_PACKAGE_NAME:}
    credentials-json: ${IAP_GOOGLE_CREDENTIALS_JSON:}
